name: Changeset Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  changeset-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changesets
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- '.changeset/*.md' | grep -v 'README.md' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changeset=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changeset=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Find existing comment
        if: steps.check.outputs.has_changeset == 'false'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "⚠️ No changeset found"

      - name: Remind to add changeset
        if: steps.check.outputs.has_changeset == 'false' && steps.find-comment.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ⚠️ **No changeset found** for this pull request.

            If this PR includes user-facing changes, please add a changeset by running:

            ```sh
            pnpm changeset
            ```

            This will generate a changeset file that describes the changes and the version bump type (patch, minor, or major).

            If this PR does **not** require a version bump (e.g. docs-only, CI changes, refactoring), you can ignore this message.

            @copilot generate a changeset for this PR.
